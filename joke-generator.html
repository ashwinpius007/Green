<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        #joke {
            margin-top: 20px;
            font-size: 24px;
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <button id="jokeButton">Get a Joke</button>
    <div id="joke"></div>

    <script>
        document.getElementById('jokeButton').addEventListener('click', fetchJoke);

        function fetchJoke() {
            fetch('https://v2.jokeapi.dev/joke/Any')
                .then(response => response.json())
                .then(data => {
                    const jokeText = data.joke ? data.joke : `${data.setup} - ${data.delivery}`;
                    document.getElementById('joke').innerText = jokeText;
                })
                .catch(err => console.error('Error fetching joke:', err));
        }
    </script>
</body>
</html>
